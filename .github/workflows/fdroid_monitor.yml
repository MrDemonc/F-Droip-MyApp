name: F-Droid Result Monitor

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore previous state
        run: |
          if [ -f .fdroid_state ]; then
            echo "PREVIOUS_STATE=$(cat .fdroid_state)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_STATE=none" >> $GITHUB_ENV
          fi

      - name: Check F-Droid result
        run: |
          URL="https://monitor.f-droid.org/builds/running"
          PACKAGE="com.demonlab.lune"

          PAGE=$(curl -s "$URL")

          if echo "$PAGE" | grep -A 500 "Failed builds" | grep -Eq "${PACKAGE}:[0-9]+"; then
            echo "STATE=failed" >> $GITHUB_ENV

          elif echo "$PAGE" | grep -A 500 "Successful builds" | grep -Eq "${PACKAGE}:[0-9]+"; then
            echo "STATE=success" >> $GITHUB_ENV

          elif echo "$PAGE" | grep -Eq "${PACKAGE}:[0-9]+"; then
            echo "STATE=running" >> $GITHUB_ENV

          else
            STATE="none"
          fi

          echo "STATE=$STATE"
          echo "state=$STATE" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

        run: |
          SEND_MESSAGE=false

          if [ "$STATE" = "running" ] && [ "$PREVIOUS_STATE" != "running" ]; then
            MESSAGE="🔄 Lune build is currently running on F-Droid"
            SEND_MESSAGE=true

          elif [ "$STATE" = "failed" ] && [ "$PREVIOUS_STATE" != "failed" ]; then
            MESSAGE="❌ Lune build failed on F-Droid"
            SEND_MESSAGE=true
          fi

          if [ "$SEND_MESSAGE" = true ]; then
            curl -s \
              -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$MESSAGE"
          fi

      - name: Save current state
        run: |
          echo "$STATE" > .fdroid_state

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .fdroid_state

          git diff --cached --quiet || git commit -m "Update F-Droid state"

      - name: Push changes
        run: |
          git push
