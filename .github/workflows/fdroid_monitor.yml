name: F-Droid Result Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore previous state
        run: |
          if [ -f .fdroid_state ]; then
            echo "PREVIOUS_STATE=$(cat .fdroid_state)" >> $GITHUB_ENV
          else
            echo "PREVIOUS_STATE=unknown" >> $GITHUB_ENV
          fi

      - name: Check F-Droid result
        run: |
          URL="https://monitor.f-droid.org/builds/running"
          PACKAGE="com.demonlab.lune"

          PAGE=$(curl -s "$URL")

          if echo "$PAGE" | grep -A 50 "Failed builds" | grep -q "$PACKAGE"; then
            echo "STATE=failed" >> $GITHUB_ENV

          elif echo "$PAGE" | grep -A 50 "Successful builds" | grep -q "$PACKAGE"; then
            echo "STATE=success" >> $GITHUB_ENV

          else
            echo "STATE=unknown" >> $GITHUB_ENV
          fi

      - name: Send Telegram notification
      if: ${{ env.STATE != env.PREVIOUS_STATE && env.STATE != 'unknown' }}
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}

      run: |
        if [ "$STATE" = "success" ]; then
          MESSAGE="✅ Lune build finished successfully on F-Droid"
        else
          MESSAGE="❌ Lune build failed on F-Droid"
        fi

        curl -s \
          -X POST \
          "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
          -d chat_id="$CHAT_ID" \
          -d text="$MESSAGE"

      - name: Save current state
        run: |
          echo "$STATE" > .fdroid_state

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .fdroid_state

          git diff --cached --quiet || git commit -m "Update F-Droid state"

      - name: Push changes
        run: |
          git push
